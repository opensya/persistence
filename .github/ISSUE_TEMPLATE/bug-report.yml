name: "Bug report"
description: Report a reproducible problem in OpenSya Persistence
title: "[Bug]: "
labels: ["pending triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve OpenSya Persistence.

        Before submitting, check the documentation and existing issues. A minimal reproduction is required unless the problem is fully demonstrated by the information provided.

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Metadata and type inference
        - Query Engine and filters
        - Validation
        - Lifecycle hooks
        - Relations
        - Field visibility and serialization
        - Audit Log
        - Domain Events and outbox
        - Cursor pagination
        - Drizzle adapter
        - Schema consistency
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include the information needed to reproduce the same runtime.
      placeholder: |
        @opensya/persistence: 0.2.1
        Node.js: 22.x
        TypeScript: 5.x
        Adapter: Drizzle PostgreSQL
        drizzle-orm: 1.0.0-beta.22
        PostgreSQL: 17
        Package manager: pnpm 10
        Operating system: Linux
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide a repository or a minimal playground scenario that reproduces the problem. Remove unrelated application code and credentials.
      placeholder: https://github.com/...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact operations that trigger the problem.
      placeholder: |
        1. Register the metadata...
        2. Create the Query Engine...
        3. Execute findOne...
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect Persistence to return or execute?
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: Describe what happened instead, including the complete error when applicable.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant text logs. Remove credentials, connection strings and sensitive data.
      render: shell

  - type: checkboxes
    id: final-checks
    attributes:
      label: Final checks
      options:
        - label: I have removed credentials and sensitive data from the reproduction and logs.
          required: true
        - label: I have checked the documentation and existing issues.
          required: true
