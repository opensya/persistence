name: Publish package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.10.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check package
        run: pnpm --filter @opensya/persistence typecheck

      - name: Build package
        run: pnpm --filter @opensya/persistence build

      - name: Verify tag matches package version
        if: github.event_name == 'push'
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/core/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "The tag version ($TAG_VERSION) does not match packages/core/package.json ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Publish package
        working-directory: packages/core
        run: npm publish --access public