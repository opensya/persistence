services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: opensya_persistence_playground
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d opensya_persistence_playground
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - playground-postgres:/var/lib/postgresql/data

volumes:
  playground-postgres:
